<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đang xử lý thanh toán...</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 80px; color: #555; }
    .spinner { width: 40px; height: 40px; border: 4px solid #8b6e45; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    // Lưu toàn bộ query params VNPAY vào sessionStorage
    // rồi redirect về trang chủ để React app xử lý
    var search = window.location.search;
    if (search) {
      sessionStorage.setItem('vnpay_return_params', search);
    }
    window.location.replace('/');
  </script>
</head>
<body>
  <div class="spinner"></div>
  <p>Đang xử lý kết quả thanh toán, vui lòng chờ...</p>
</body>
</html>
